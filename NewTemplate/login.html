<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Entrar · Awesome Project App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="auth.css" rel="stylesheet">
</head>
<body>

<div class="auth-shell">
  <main class="auth-card" role="main">
    <a href="index.html" class="brand" aria-label="Awesome Project App">
      <span class="mark" aria-hidden="true">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
          <defs>
            <linearGradient id="m1" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0%"  stop-color="oklch(0.62 0.20 264)"/>
              <stop offset="100%" stop-color="oklch(0.50 0.22 264)"/>
            </linearGradient>
            <linearGradient id="m2" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0%"  stop-color="oklch(0.74 0.16 290)"/>
              <stop offset="100%" stop-color="oklch(0.60 0.20 270)"/>
            </linearGradient>
          </defs>
          <rect x="1.5"  y="1.5"  width="9" height="9" rx="2.2" fill="url(#m1)"/>
          <rect x="13.5" y="1.5"  width="9" height="9" rx="2.2" fill="url(#m2)"/>
          <rect x="1.5"  y="13.5" width="9" height="9" rx="2.2" fill="url(#m2)"/>
          <rect x="13.5" y="13.5" width="9" height="9" rx="2.2" fill="url(#m1)"/>
        </svg>
      </span>
      <span class="name">Awesome Project App</span>
    </a>

    <h1 class="auth-title">Bem-vindo de volta!</h1>
    <p class="auth-sub">Não tem uma conta? <a href="cadastro.html">Criar uma conta</a></p>

    <button type="button" class="provider-btn" id="google-btn">
      <svg viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C12.955 4 4 12.955 4 24s8.955 20 20 20s20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
      Continuar com Google
    </button>
    <button type="button" class="provider-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.5 19a4.5 4.5 0 1 0 0-9 5.5 5.5 0 0 0-10.83-.91A4 4 0 0 0 6.5 19h11z"/></svg>
      Continuar com SSO
    </button>

    <div class="divider">ou</div>

    <form id="login-form" novalidate>
      <div class="form-row">
        <input type="email" class="input" name="email" id="email"
               placeholder="E-mail de trabalho" autocomplete="email" required>
      </div>
      <div class="form-row">
        <div class="input-wrap">
          <input type="password" class="input has-action" name="password" id="password"
                 placeholder="Senha" autocomplete="current-password" required>
          <button type="button" class="input-action" id="toggle-pwd" aria-label="Mostrar senha">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-primary" id="submit" disabled>Entrar</button>
      <a href="recuperar-senha.html" class="text-link">Esqueceu a senha?</a>
    </form>
  </main>
</div>

<footer class="auth-footer">
  <a href="#">Termos de serviço</a>
  <span class="sep"></span>
  <a href="#">Política de privacidade</a>
  <span class="sep"></span>
  <a href="#">Precisa de ajuda?</a>
</footer>

<script>
  (function () {
    const form = document.getElementById('login-form');
    const email = document.getElementById('email');
    const pwd   = document.getElementById('password');
    const submit = document.getElementById('submit');
    const toggle = document.getElementById('toggle-pwd');

    function update() {
      submit.disabled = !(email.value.trim() && pwd.value.trim());
    }
    [email, pwd].forEach(el => el.addEventListener('input', update));

    toggle.addEventListener('click', () => {
      const isPwd = pwd.type === 'password';
      pwd.type = isPwd ? 'text' : 'password';
      toggle.setAttribute('aria-label', isPwd ? 'Ocultar senha' : 'Mostrar senha');
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      // Stub — in a real flow, post credentials and navigate on success.
      window.location.href = 'app-dark.html';
    });
  })();
</script>

</body>
</html>
