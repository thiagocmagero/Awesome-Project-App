<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Awesome Project App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style id="boot-css">html,body,#root{height:100%;margin:0;font-family:'Geist','Inter',system-ui,sans-serif;background:#f7f7f9;color:#1c1d24}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel" src="views-shared.jsx"></script>
<script type="text/babel" src="views-gantt.jsx"></script>
<script type="text/babel" src="views-board.jsx"></script>
<script type="text/babel">
  // Inject component CSS once the app module has loaded its tokens.
  const styleEl = document.createElement('style');
  styleEl.id = 'awp-css';
  styleEl.textContent = (window.awpCss || '') + '\n' + (window.sharedCss || '') + '\n' + (window.ganttCss || '') + '\n' + (window.boardCss || '');
  document.head.appendChild(styleEl);
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
